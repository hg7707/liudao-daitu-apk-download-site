<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><meta name="theme-color" content="#2563eb"><title>管理员统计</title><link rel="icon" href="/images/favicon.svg"><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/admin.css"></head>
<body class="admin-body"><header class="admin-header"><a class="brand" href="/"><span class="brand-mark">A</span>返回官网</a><button id="logoutButton" class="logout-button" hidden>退出登录</button></header><main class="admin-main"><section id="loginPanel" class="admin-login-card"><p class="eyebrow">受保护区域</p><h1>管理员统计</h1><p>请输入管理员密码以查看下载数据。</p><form id="loginForm"><label for="password">管理员密码</label><input id="password" name="password" type="password" required autocomplete="current-password" minlength="1" placeholder="请输入密码"><button type="submit">安全登录</button><div id="loginError" class="form-error" role="alert"></div></form></section><section id="dashboard" hidden><div class="dashboard-title"><div><p class="eyebrow">只读数据面板</p><h1>下载统计</h1><p id="statsMeta">正在加载…</p></div><button id="refreshButton" class="refresh-button">刷新数据</button></div><div class="metric-grid"><article><span>总下载次数</span><b id="totalDownloads">0</b></article><article><span>今日下载次数</span><b id="todayDownloads">0</b></article><article><span>当前版本</span><b id="latestVersion">-</b></article><article><span>最近下载时间</span><b id="lastDownloadAt">暂无</b></article></div><div class="stats-grid"><article class="stats-card"><h2>设备类型</h2><div id="deviceStats" class="bar-list"></div></article><article class="stats-card"><h2>版本下载次数</h2><div id="versionStats" class="bar-list"></div></article></div><p class="stats-note">统计数据保存在服务器 JSON 文件。Render 免费实例重新部署或休眠恢复后，本地磁盘数据可能重置；生产环境请迁移到持久化存储。</p></section></main><script src="/js/admin.js" defer></script></body></html>
